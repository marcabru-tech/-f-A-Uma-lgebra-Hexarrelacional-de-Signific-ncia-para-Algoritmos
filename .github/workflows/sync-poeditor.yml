name: Sync POEditor Translations

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:  # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync translations from POEditor
        env:
          POEDITOR_API_KEY: ${{ secrets.POEDITOR_API_KEY }}
          POEDITOR_PROJECT_ID: ${{ secrets.POEDITOR_PROJECT_ID }}
        run: |
          mkdir -p locales
          for lang in en pt_BR zh ja ar; do
            echo "Downloading ${lang}..."
            curl -s -X POST "https://api.poeditor.com/v2/projects/languages/list" \
              -d api_token="${POEDITOR_API_KEY}" \
              -d id="${POEDITOR_PROJECT_ID}" > /dev/null
            curl -s -X POST "https://api.poeditor.com/v2/projects/export" \
              -d api_token="${POEDITOR_API_KEY}" \
              -d id="${POEDITOR_PROJECT_ID}" \
              -d language="${lang}" \
              -d type="key_value_json" \
              -o "locales/${lang}.json.tmp"
            # Extract the inner JSON from POEditor response
            python3 -c "
          import json, sys
          with open('locales/${lang}.json.tmp') as f:
              data = json.load(f)
          if data.get('response', {}).get('code') == '200':
              with open('locales/${lang}.json', 'w', encoding='utf-8') as out:
                  json.dump(data['result']['terms'], out, ensure_ascii=False, indent=2)
                  print('${lang}: OK')
          else:
              print('${lang}: ERROR - ' + str(data.get('response', {})))
          "
            rm -f "locales/${lang}.json.tmp"
          done

      - name: Create PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(i18n): sync translations from POEditor"
          title: "i18n: Sync translations from POEditor"
          branch: i18n/poeditor-sync
          body: "Auto-generated PR: translations synced from POEditor"

      - name: Upload locales artifact
        uses: actions/upload-artifact@v4
        with:
          name: locales
          path: locales/
